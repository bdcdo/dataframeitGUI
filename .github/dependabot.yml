# Dependabot — atualizacao automatica de dependencias vulneraveis/desatualizadas.
# Roda no servidor do GitHub e abre PRs sozinho; nao ha nada para rodar na mao.
# Cobre os tres ecossistemas do repo. Ver docs/CODE_QUALITY_TOOLING.md.
#
# cooldown (default-days: 7): espera 7 dias antes de propor uma versao
# recem-publicada — janela de defesa contra supply-chain (pacote malicioso
# publicado e puxado antes de ser detectado).
version: 2
updates:
  # Frontend (Next.js / React) — npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      # Agrupa minor/patch num PR so para reduzir ruido; majors vem separados.
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # ESLint major fica travado em 9 ate o Next 16 suportar ESLint 10. O
      # eslint-plugin-react embutido no eslint-config-next ainda chama
      # context.getFilename(), removido no ESLint 10 — o bump 9->10 (#278)
      # quebrou `npm run lint` e `lint:types`. Remover quando o Next suportar v10.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # TypeScript major fica travado em 6 ate o typescript-eslint suportar TS 7.
      # O typescript-eslint 8.63.0 declara peer `typescript: >=4.8.4 <6.1.0`; no
      # bump 6->7 (#471) o npm aninhou a arvore do typescript-eslint SEM aninhar
      # um TS 6 junto, entao o parser resolvia o TS 7 da raiz com o peer violado
      # — `lint:types` rodaria sobre versao que a upstream declara nao suportar.
      # O teto do peer e 6.1, nao 7 — fronteira minor. Por isso a trava e dupla e
      # simetrica: o `package.json` declara `~6.0` (barra o `npm install`) e este
      # ignore cobre minor+major (barra o Dependabot, que sob o `versioning-strategy`
      # default `auto` elevaria a faixa para `~6.1` num PR do grupo minor-patch —
      # 6.0.3->6.1.0 e semver-minor, entao um ignore so de major nao pegaria).
      # A 6.0.x segue livre. Ao destravar, mexer nos dois: faixa e ignore.
      # Remover quando sair o typescript-eslint 9 com suporte a TS 7.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    labels:
      - "dependencies"
      - "frontend"

  # Backend (FastAPI) — uv (ecossistema nativo: le pyproject.toml + uv.lock e
  # mantem o lockfile em dia; o ecossistema `pip` NAO atualiza uv.lock).
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "backend"

  # GitHub Actions usadas nos workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "ci"

  # Hooks de .pre-commit-config.yaml. Sem esta entrada, o `rev` do
  # ruff-pre-commit ficava parado enquanto o ecossistema `uv` subia o `ruff` do
  # dependency-group dev — a mesma ferramenta rodando em duas versoes conforme
  # o caminho (hook de commit vs. `uv run ruff`). Cobre tambem gitleaks e
  # actionlint, hoje pinados a mao.
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "ci"
