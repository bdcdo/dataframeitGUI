name: Database contract tests

on:
  pull_request:
    paths:
      - ".github/workflows/database-tests.yml"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/scripts/run-sql-test.sh"
      - "frontend/supabase/migrations/**"
      # Glob, não a lista nominal: enquanto o filtro citava um arquivo só, as
      # suítes novas entravam no repo sem gate nenhum e ninguém percebia.
      - "frontend/supabase/tests/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: database-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  database-contracts:
    name: Database contracts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.10.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx supabase start
      - run: npx supabase db reset --local --no-seed

      # Cada suíte roda em passo próprio: um `npm run test:db` só diria que
      # "o banco falhou", e a suíte que quebrou é a informação útil.
      - name: Responses LLM actor integrity
        run: npm run test:db:responses-actor
      - name: Identidade canônica por projeto e RLS
        run: npm run test:db:identity
      - name: Mapping Clerk e snapshot em duas fases
        run: npm run test:db:clerk-mapping
      - name: Fechamento da fila de auto-revisão
        run: npm run test:db:auto-review-sync
      - name: RPCs atômicas de replace
        run: npm run test:db:atomic-replace
      - name: Rate limit de LLM
        run: npm run test:db:llm-rate-limit
      - name: RPCs de permissão de membros
        run: npm run test:db:member-permissions
      - name: Column guard de project_members
        run: npm run test:db:column-guard

      # As fixtures deste precisam estar commitadas (duas conexões dblink veem
      # o mesmo estado), então ele suja o banco e fica por último.
      - name: Concorrência da auto-revisão
        run: npm run test:db:auto-review-concurrency
