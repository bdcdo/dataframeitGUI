[project]
name = "dataframeit-gui-backend"
version = "0.1.0"
description = "Backend FastAPI para dataframeit"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "supabase>=2.11",
    "dataframeit>=0.5.3",
    "pandas>=2.2",
    "langchain-google-genai>=2.1",
    "langchain-openai>=0.3",
    "langchain-anthropic>=0.3",
    "pyjwt[crypto]>=2.9",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "httpx>=0.27",
]

# Este projeto é um app FastAPI executado via `uvicorn main:app`, não uma lib
# instalável — não há diretório de pacote para empacotar. Sem isto, `uv sync` /
# `uv run` falham tentando buildar um wheel. O deploy (Dockerfile) instala as
# dependências direto via `uv pip install --system`, sem empacotar o app.
[tool.uv]
package = false

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
