[project]
name = "gui-analise-conteudo-backend"
version = "0.1.0"
description = "Backend FastAPI para análise de conteúdo"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "supabase>=2.11",
    "dataframeit>=0.5.3",
    "pandas>=2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
