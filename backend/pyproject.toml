[project]
name = "dataframeit-gui-backend"
version = "0.1.0"
description = "Backend FastAPI para dataframeit"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "supabase>=2.11",
    "dataframeit>=0.5.3",
    "pandas>=2.2",
    "langchain-google-genai>=2.1",
    "langchain-openai>=0.3",
    "langchain-anthropic>=0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
