app = "gui-analise-sistematica-api"
primary_region = "gru"

# Dar tempo (5min, maximo permitido pelo Fly) para BackgroundTasks LLM em
# andamento terminarem antes do SIGKILL durante deploys ou restarts.
# Default do Fly e 5s, o que matava jobs no meio.
kill_timeout = "5m"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Bluegreen: sobe uma VM nova, espera passar no health check, transfere
  # trafego e so depois derruba a antiga. Elimina a janela de 502 durante
  # o deploy automatico (fly-deploy.yml).
  strategy = "bluegreen"

[http_service]
  internal_port = 8000
  force_https = true
  # Manter ao menos 1 maquina rodando: o backend roda LLM em BackgroundTasks
  # apos retornar o HTTP response. Com auto_stop + min=0 (config anterior), o
  # Fly considerava a maquina ociosa entre requests e a adormecia no meio do
  # processamento, matando o job. Alem disso, o cold start (imagem pesada com
  # pandas + langchain) estourava o timeout do proxy do Fly e gerava 502
  # [PU02] na primeira request apos a maquina dormir.
  auto_stop_machines = "off"
  min_machines_running = 1

  # Health check: se o processo travar/sair (OOM, deadlock), o Fly reinicia
  # automaticamente. O endpoint /health esta em main.py:23.
  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[env]
  PORT = "8000"
  FRONTEND_INTERNAL_URL = "https://gui-analise-sistematica-frontend.fly.dev"
  # AUTO_REVIEW_RECONCILIATION_SECRET é um secret do Fly, não uma env versionada.
  CORS_ORIGINS = '["https://dataframeit.com.br", "https://gui-analise-sistematica-frontend.fly.dev", "https://ac.brunodcdo.com.br", "http://localhost:3000"]'
  LLM_RATE_LIMIT_REQUESTS = "5"
  LLM_RATE_LIMIT_WINDOW_SECONDS = "60"
  # Identidade da instância Clerk. Não são secrets: o JWKS é um endpoint público
  # e o issuer é a URL da Frontend API. Ficam aqui, e não em `fly secrets`, para
  # que a troca de instância (dev -> produção) seja um diff revisável num PR em
  # vez de dois `fly secrets set` fora de banda que podem divergir entre si.
  # Os dois andam juntos: o boot falha se o JWKS estiver setado sem o issuer
  # (main.py), porque é o issuer que distingue as instâncias.
  #
  # ATENÇÃO ao trocar de instância: um `fly secret` de mesmo nome SOMBREIA o
  # valor daqui, silenciosamente (já aconteceu neste app com CORS_ORIGINS).
  # Se o secret CLERK_JWKS_URL ainda existir, editar só este arquivo deixa o
  # JWKS na instância antiga e o issuer na nova — e o par divergente é
  # justamente o que a validação de `iss` existe para tornar diagnosticável.
  # Conferir com `fly secrets list -a gui-analise-sistematica-api` e, se
  # aparecer, `fly secrets unset CLERK_JWKS_URL -a gui-analise-sistematica-api`.
  CLERK_JWKS_URL = "https://innocent-foxhound-88.clerk.accounts.dev/.well-known/jwks.json"
  CLERK_JWT_ISSUER = "https://innocent-foxhound-88.clerk.accounts.dev"
  # ENABLE_DOCS ausente de propósito: o default fail-safe (config.py) mantém
  # /docs, /redoc e /openapi.json fechados em produção. NÃO adicionar aqui.
